<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZER0X SHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    direction:rtl;
    font-family:'Vazirmatn', sans-serif;
    background:#0d0d14;
    color:white;
}

header{
    padding:40px;
    text-align:center;
    font-size:48px;
    font-weight:900;
    letter-spacing:4px;
    background:linear-gradient(270deg,#ff0000,#9900ff,#00ffee,#ff0000);
    background-size:800% 800%;
    animation:moveBg 8s ease infinite;
}

@keyframes moveBg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.subtitle{
    text-align:center;
    margin-top:10px;
    color:#aaa;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:40px;
    padding:60px 20px;
}

.card{
    background:#1a1a2e;
    width:320px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 25px rgba(255,0,0,0.3);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 40px rgba(255,0,0,0.7);
}

.card img{
    width:100%;
    height:230px;
    object-fit:cover;
}

.card-content{
    padding:20px;
    text-align:center;
}

.price{
    margin:15px 0;
    font-size:20px;
    font-weight:bold;
    color:#00ffee;
}

.neon-btn{
    position:relative;
    display:inline-block;
    padding:14px 25px;
    color:white;
    text-decoration:none;
    font-weight:bold;
    border-radius:12px;
    background:#111;
    overflow:hidden;
}

.neon-btn::before{
    content:"";
    position:absolute;
    top:-2px;
    left:-2px;
    right:-2px;
    bottom:-2px;
    background:linear-gradient(90deg,red,orange,red);
    background-size:400%;
    z-index:-1;
    border-radius:14px;
    animation:neonRotate 3s linear infinite;
}

@keyframes neonRotate{
    0%{background-position:0%;}
    100%{background-position:400%;}
}

footer{
    text-align:center;
    padding:30px;
    background:#141427;
    margin-top:40px;
}
</style>
</head>

<body>

<header>ZER0X SHOP</header>
<div class="subtitle">فروش پروژه و خدمات ادیت حرفه‌ای</div>

<div class="container">

    <!-- محصول اول -->
    <div class="card">
        <img src="cc2.jpg">
        <div class="card-content">
            <h2>پروژه ادیت cc2</h2>
            <div class="price">50,000 تومان</div>
            <a class="neon-btn"
            href="https://wa.me/989019914885?text=سلام%20برای%20خرید%20cc2%20اومدم"
            target="_blank">
            ثبت سفارش
            </a>
        </div>
    </div>

    <!-- محصول دوم -->
    <div class="card">
        <img src="af.jpg">
        <div class="card-content">
            <h2>سفارش ادیت اختصاصی</h2>
            <div class="price">قیمت: توافقی</div>
            <a class="neon-btn"
            href="https://wa.me/989019914885?text=سلام%20برای%20سفارش%20ادیت%20اومدم"
            target="_blank">
            ثبت سفارش
            </a>
        </div>
    </div>

</div>

<footer>
ارتباط مستقیم واتساپ: 09019914885
</footer>

</body>
</html>
