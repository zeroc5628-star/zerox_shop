<style>
body{
    margin:0;
    direction:rtl;
    font-family:'Vazirmatn', sans-serif;
    background:#0f0f1a;
    color:white;

header{
    padding:35px;
    text-align:center;
    font-size:48px;
    font-weight:900;
    letter-spacing:3px;
    background:linear-gradient(270deg,#ff00cc,#3333ff,#00ffee,#ff9900);
    background-size:800% 800%;
    animation:moveBg 8s ease infinite;
}

@keyframes moveBg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.subtitle{
    text-align:center;

    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(0,255,255,0.3);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 40px rgba(0,255,255,0.7);
}

.card img{
    width:100%;
    height:260px;
    object-fit:cover;
}

.card-content{
    padding:20px;
    text-align:center;
}

.price{
    color:#00ffee;
    font-size:22px;
    font-weight:bold;
    margin:15px 0;
}

.whatsapp-btn{
    display:inline-block;
    background:#25D366;
    color:white;
    padding:14px 20px;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.whatsapp-btn:hover{
    background:#1ebe5d;
    transform:scale(1.05);
}

footer{
    text-align:center;
    padding:30px;
    margin-top:40px;
    background:#141427;
}
</style>
</head>

<body>

</div>
